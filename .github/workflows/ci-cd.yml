name: C3P CI/CD Pipeline
# STORY-000: Hello World & C3P Pipeline Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      # Documentation and role instructions — no deployment impact
      - '**/*.md'
      # Task tracking files
      - 'tasks/**'
      # Repo housekeeping
      - '.gitignore'
      - 'LICENSE'
      # Terraform infrastructure (managed separately, not part of app pipeline)
      - 'infra/**'

env:
  # Docker requires repository names to be strictly lowercase
  IMAGE_REPO: ghcr.io/pgallc/crisis_monitor
  GCP_PROJECT_ID: paulgresham-com
  GKE_CLUSTER_NAME: crisis-monitor-cluster
  GKE_CLUSTER_ZONE: us-east1

jobs:
  # ============================================================
  # GATE 1: Unit Tests — Runs on every PR and every push to main.
  # This is the required status check for the C3P branch protection rule.
  # ============================================================
  test-unit:
    name: "C3P Gate: Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ============================================================
  # STAGE 2: Build & Publish Docker Image to GHCR
  # Runs only after a merge to main.
  # ============================================================
  build-and-push:
    name: "C3P Stage: Build & Publish Artifact"
    runs-on: ubuntu-latest
    needs: test-unit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ env.IMAGE_REPO }}:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            VERSION=${{ steps.pkg.outputs.version }}

  # ============================================================
  # STAGE 3: Deploy to Test + Run Functional Tests
  # Automatically triggered after a successful image build.
  # ============================================================
  deploy-test:
    name: "C3P Stage: Deploy to Test"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: Test
    env:
      IMAGE_TAG: ghcr.io/pgallc/crisis_monitor:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_CLUSTER_ZONE }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run deploy_test.sh
        run: bash scripts/deploy_test.sh

  # ============================================================
  # STAGE 4: SRE Approval Gate — Deploy to Production
  #
  # The 'Production' GitHub Environment is configured with C3P-SRE
  # as a Required Reviewer. The pipeline pauses here until the SRE
  # logs in to GitHub and approves the deployment.
  # ============================================================
  deploy-prod:
    name: "C3P Stage: Deploy to Production [SRE Gate]"
    runs-on: ubuntu-latest
    needs: deploy-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: Production
    env:
      IMAGE_TAG: ghcr.io/pgallc/crisis_monitor:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_CLUSTER_ZONE }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run deploy_prod.sh
        run: bash scripts/deploy_prod.sh

      - name: Generate C3P Evidence Pack
        run: |
          cat << EOF > c3p-evidence.json
          {
            "story_id": "STORY-000",
            "commit_sha": "${{ github.sha }}",
            "image_tag": "${IMAGE_TAG}",
            "actor": "${{ github.actor }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          cat c3p-evidence.json

      - name: Upload C3P Evidence Pack
        uses: actions/upload-artifact@v4
        with:
          name: c3p-evidence-pack-${{ github.sha }}
          path: c3p-evidence.json
          retention-days: 90
